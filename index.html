<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I have a small question... ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf2f5;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -40px;
      font-size: 20px;
      animation: fall linear infinite;
      opacity: 0.5;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 40px;
      max-width: 600px;
    }

    .decoration {
      font-size: 36px;
      letter-spacing: 12px;
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 400;
      color: #9b2c52;
      line-height: 1.3;
      margin-bottom: 52px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    #yesBtn {
      background-color: #c0395f;
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #yesBtn:hover {
      background-color: #a02d4f;
      transform: scale(1.04);
    }

    #noBtn {
      background-color: transparent;
      color: #c0395f;
      border: 1.5px solid #c0395f;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      cursor: pointer;
      position: fixed;
      transition: none;
      /* position initiale hors écran pour éviter un flash */
      left: 50%;
      top: 70%;
    }
  </style>
</head>
<body>

  <div class="petals" id="petals"></div>

  <div class="container">
    <div class="decoration">🩷</div>
    <h1>Do you want to go on a date with me?</h1>
    <div class="buttons">
      <button id="yesBtn">Yes !</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');

    noBtn.addEventListener('mouseover', function () {
      const margin = 20;
      const x = margin + Math.random() * (window.innerWidth - noBtn.offsetWidth - margin * 2);
      const y = margin + Math.random() * (window.innerHeight - noBtn.offsetHeight - margin * 2);
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    });

    yesBtn.addEventListener('click', function () {
      window.location.href = 'oui.html';
    });

    const emojis = ['🌸', '💕', '✿', '❀', '💗'];
    const container = document.getElementById('petals');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.classList.add('petal');
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (5 + Math.random() * 8) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.fontSize = (14 + Math.random() * 18) + 'px';
      container.appendChild(p);
    }
  </script>

</body>
</html>
